<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DANVELOPER — US Watchlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* Morandi dark palette — muted, desaturated, warm-cool balance */
  --bg:        #e8e4dc;   /* warm light linen — 比台股 #f5f2ec 稍深 */
  --bg2:       #dedad1;   /* card surface */
  --bg3:       #d4cfc5;   /* elevated card */
  --bg4:       #ccc7bc;   /* hover/selected */
  --border:    rgba(140,130,115,0.18);
  --border2:   rgba(140,130,115,0.30);
  --border3:   rgba(140,130,115,0.50);

  /* Morandi text */
  --text:      #3a3530;
  --text2:     #6e6560;
  --text3:     #9e9890;

  /* Morandi accent palette */
  --sage:      #5e8c72;   /* muted sage green */
  --sage-dim:  rgba(94,140,114,0.12);
  --clay:      #9e5e3e;   /* warm terracotta */
  --clay-dim:  rgba(158,94,62,0.10);
  --steel:     #5a7a94;   /* muted slate blue */
  --steel-dim: rgba(90,122,148,0.12);
  --sand:      #9a7e5a;   /* warm sand */
  --sand-dim:  rgba(154,126,90,0.12);
  --rose:      #a06060;   /* dusty rose */
  --rose-dim:  rgba(160,96,96,0.12);
  --lavender:  #7a6a9a;   /* muted lavender */
  --lav-dim:   rgba(122,106,154,0.12);

  --mono: 'DM Mono', monospace;
  --serif: 'Cormorant Garamond', 'Noto Sans TC', serif;
  --sans: 'Noto Sans TC', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  font-size: 14px;
}

/* Subtle noise texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  opacity: 0.25;
  z-index: 0;
}

.page { position: relative; z-index: 1; max-width: 1020px; margin: 0 auto; padding: 2.5rem 2rem 5rem; }

/* ── Header ── */
.header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2.5rem; gap: 1rem; }
.brand-block { display: flex; flex-direction: column; gap: 3px; }
.brand-eye {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 2px;
}
.brand-title {
  font-family: var(--serif);
  font-size: 30px;
  font-weight: 500;
  font-style: italic;
  color: var(--text);
  letter-spacing: -0.01em;
  line-height: 1;
}
.brand-title em { color: var(--sand); font-style: normal; }
.brand-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.1em;
  margin-top: 4px;
}

.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
.market-pill {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  border-radius: 20px;
  padding: 5px 12px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
}
.market-led { width: 5px; height: 5px; border-radius: 50%; background: var(--rose); }
.market-led.open { background: var(--sage); box-shadow: 0 0 6px var(--sage); }

.scan-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--bg3);
  border: 0.5px solid var(--border3);
  border-radius: 8px;
  padding: 9px 20px;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  color: var(--sand);
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.2s;
}
.scan-btn:hover {
  background: var(--sand-dim);
  border-color: var(--sand);
  transform: translateY(-1px);
}
.scan-btn svg { width: 13px; height: 13px; }

/* ── Stats row ── */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 2rem; }
.stat-card {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.stat-lbl { font-size: 9px; font-weight: 500; letter-spacing: 0.14em; color: var(--text3); text-transform: uppercase; margin-bottom: 7px; }
.stat-val { font-family: var(--mono); font-size: 20px; color: var(--text); font-weight: 400; }
.stat-val.sage { color: var(--sage); }
.stat-val.clay { color: var(--sand); }
.stat-val.muted { font-size: 13px; color: var(--text2); }

/* ── Search ── */
.search-section { margin-bottom: 1.5rem; }
.section-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.16em;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 10px;
  display: block;
}
.search-row { display: flex; gap: 10px; }

.search-container { flex: 1; position: relative; }
.search-wrap {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg2);
  border: 0.5px solid var(--border2);
  border-radius: 10px;
  padding: 0 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap:focus-within {
  border-color: var(--sand);
  box-shadow: 0 0 0 3px var(--sand-dim);
}
.search-wrap svg { width: 14px; height: 14px; color: var(--text3); flex-shrink: 0; }
.search-input {
  flex: 1; background: none; border: none; outline: none;
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text);
  padding: 11px 0;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.search-input::placeholder { color: var(--text3); text-transform: none; font-size: 12px; letter-spacing: 0.02em; font-family: var(--sans); }

.add-btn {
  background: var(--bg2);
  border: 0.5px solid var(--border2);
  border-radius: 10px;
  padding: 0 22px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
  letter-spacing: 0.06em;
}
.add-btn:hover { border-color: var(--sage); color: var(--sage); background: var(--sage-dim); }

/* Dropdown */
.suggestions {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  border-radius: 10px;
  overflow: hidden;
  z-index: 100;
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  display: none;
}
.suggestions.show { display: block; }
.sug-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 0.5px solid var(--border);
  transition: background 0.12s;
}
.sug-item:last-child { border-bottom: none; }
.sug-item:hover { background: var(--bg4); }
.sug-ticker { font-family: var(--mono); font-size: 13px; color: var(--sand); min-width: 58px; font-weight: 500; }
.sug-name { font-size: 12px; color: var(--text2); }
.sug-sector { margin-left: auto; font-size: 10px; color: var(--text3); letter-spacing: 0.06em; }

/* ── Filter row ── */
.filter-row {
  display: flex; align-items: center; gap: 7px;
  margin-bottom: 1.25rem; flex-wrap: wrap;
}
.filter-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; color: var(--text3); margin-right: 2px; text-transform: uppercase; }
.chip {
  font-family: var(--mono);
  font-size: 10px; letter-spacing: 0.08em;
  padding: 4px 12px;
  border-radius: 20px;
  border: 0.5px solid var(--border2);
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
}
.chip:hover { border-color: var(--border3); color: var(--text2); }
.chip.active { background: var(--sand-dim); border-color: var(--sand); color: var(--sand); }
.spacer { flex: 1; }
.count-txt { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.06em; }

/* ── Stock card list ── */
.stock-list { display: flex; flex-direction: column; gap: 0; }

/* Table header */
.list-header {
  display: grid;
  grid-template-columns: 36px 76px 1fr 96px 88px 260px 96px 40px;
  padding: 8px 16px;
  background: var(--bg3);
  border: 0.5px solid var(--border);
  border-radius: 10px 10px 0 0;
  margin-bottom: 1px;
}
.lh { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; color: var(--text3); text-transform: uppercase; }
.lh.r { text-align: right; }
.lh.c { text-align: center; }

/* Stock row */
.stock-row {
  display: grid;
  grid-template-columns: 36px 76px 1fr 96px 88px 260px 96px 40px;
  padding: 14px 16px;
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-top: none;
  align-items: start;
  transition: background 0.15s;
  animation: fadeIn 0.28s ease both;
}
.stock-row:last-child { border-radius: 0 0 10px 10px; }
.stock-row:hover { background: var(--bg3); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.row-num { font-family: var(--mono); font-size: 11px; color: var(--text3); padding-top: 2px; }
.row-ticker-wrap { display: flex; align-items: center; gap: 6px; }
.sector-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.row-ticker { font-family: var(--mono); font-size: 14px; color: var(--sand); font-weight: 500; letter-spacing: 0.06em; }
.row-name-cell { padding-right: 12px; padding-top: 1px; }
.row-name { font-size: 13px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-sector-tag { font-family: var(--mono); font-size: 9px; color: var(--text3); margin-top: 3px; letter-spacing: 0.06em; }

.row-price { font-family: var(--mono); font-size: 14px; text-align: right; color: var(--text); padding-top: 2px; }
.row-chg { font-family: var(--mono); font-size: 12px; text-align: right; font-weight: 500; padding-top: 2px; }
.row-chg.pos { color: var(--sage); }
.row-chg.neg { color: var(--rose); }
.row-chg.neu { color: var(--text3); }

/* ── Signal card — the star of the show ── */
.signal-area { display: flex; flex-direction: column; gap: 5px; }

.signal-card {
  border-radius: 7px;
  padding: 7px 10px;
  border-left: 2px solid transparent;
  transition: all 0.15s;
}
.signal-card.combo-a { background: rgba(90,122,148,0.09); border-color: var(--steel); }
.signal-card.combo-b { background: rgba(122,106,154,0.09); border-color: var(--lavender); }
.signal-card.combo-c { background: rgba(160,96,96,0.09); border-color: var(--rose); }
.signal-card.combo-d { background: rgba(94,140,114,0.09); border-color: var(--sage); }
.signal-card.combo-e { background: rgba(154,126,90,0.09); border-color: var(--sand); }
.signal-card.combo-f { background: rgba(158,94,62,0.09); border-color: var(--clay); }
.signal-card.ai { background: rgba(122,106,154,0.10); border-color: var(--lavender); }

.signal-top { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
.signal-badge {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.1em;
  padding: 2px 7px;
  border-radius: 3px;
}
.badge-a { background: var(--steel-dim); color: var(--steel); }
.badge-b { background: var(--lav-dim); color: var(--lavender); }
.badge-c { background: var(--rose-dim); color: var(--rose); }
.badge-d { background: var(--sage-dim); color: var(--sage); }
.badge-e { background: var(--sand-dim); color: var(--sand); }
.badge-f { background: var(--clay-dim); color: var(--clay); }
.badge-ai { background: var(--lav-dim); color: var(--lavender); }

.signal-name { font-size: 11px; font-weight: 500; color: var(--text); letter-spacing: 0.02em; }
.signal-stars { font-size: 9px; color: var(--sand); margin-left: auto; letter-spacing: -1px; }
.signal-desc { font-size: 11px; color: var(--text2); line-height: 1.55; }
.signal-desc strong { color: var(--text); font-weight: 500; }
.signal-meta {
  margin-top: 4px;
  display: flex; gap: 6px; flex-wrap: wrap;
}
.meta-chip {
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 7px;
  border-radius: 3px;
  background: rgba(255,255,255,0.04);
  color: var(--text3);
  letter-spacing: 0.04em;
}
.meta-chip.pos { color: var(--sage); background: var(--sage-dim); }
.meta-chip.neg { color: var(--rose); background: var(--rose-dim); }
.meta-chip.warn { color: var(--sand); background: var(--sand-dim); }

/* No signal */
.no-signal { font-family: var(--mono); font-size: 10px; color: var(--text3); padding: 4px 0; letter-spacing: 0.04em; }

/* Earnings */
.earnings-cell { text-align: right; padding-top: 2px; }
.earn-date { font-family: var(--mono); font-size: 11px; }
.earn-date.warn { color: var(--sand); }
.earn-date.safe { color: var(--text3); }
.earn-days { font-family: var(--mono); font-size: 9px; margin-top: 3px; }
.earn-days.warn { color: var(--sand); }
.earn-days.safe { color: var(--text3); }

/* Del btn */
.del-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text3); transition: color 0.15s;
  display: flex; align-items: flex-start; justify-content: flex-end;
  padding-top: 3px;
}
.del-btn:hover { color: var(--rose); }
.del-btn svg { width: 14px; height: 14px; }

/* Empty */
.empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 5rem 2rem; gap: 10px;
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 10px;
}
.empty-glyph { font-family: var(--serif); font-size: 40px; color: var(--text3); font-style: italic; }
.empty-title { font-size: 14px; color: var(--text2); }
.empty-desc { font-size: 12px; color: var(--text3); text-align: center; line-height: 1.7; max-width: 280px; }

/* ── Scan modal ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(200,195,188,0.65);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.22s;
}
.overlay.show { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg2);
  border: 0.5px solid var(--border2);
  border-radius: 16px;
  padding: 2rem 2rem 1.5rem;
  width: 500px; max-width: 92vw;
  transform: translateY(10px); transition: transform 0.22s;
}
.overlay.show .modal { transform: translateY(0); }
.modal-title {
  font-family: var(--serif);
  font-size: 20px;
  font-style: italic;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 1.5rem;
  display: flex; align-items: center; gap: 10px;
}
.modal-title svg { width: 18px; height: 18px; color: var(--sand); }
.step-list { display: flex; flex-direction: column; gap: 10px; }
.step-item { display: flex; align-items: center; gap: 12px; font-size: 13px; }
.step-icon { width: 18px; height: 18px; flex-shrink: 0; }
.step-icon.wait { color: var(--text3); }
.step-icon.run { color: var(--sand); animation: spin 1s linear infinite; }
.step-icon.done { color: var(--sage); }
@keyframes spin { to { transform: rotate(360deg); } }
.step-txt.wait { color: var(--text3); }
.step-txt.run { color: var(--text); }
.step-txt.done { color: var(--text2); }

.pbar-wrap { height: 2px; background: var(--border); border-radius: 2px; margin: 1.25rem 0; overflow: hidden; }
.pbar { height: 100%; background: var(--sand); border-radius: 2px; transition: width 0.45s ease; }
.scan-note { font-size: 12px; color: var(--text2); min-height: 18px; }
.modal-close {
  width: 100%; margin-top: 1.25rem; padding: 10px;
  background: var(--bg2); border: 0.5px solid var(--border2);
  border-radius: 8px; color: var(--text2);
  font-family: var(--sans); font-size: 12px;
  cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em;
}
.modal-close:hover:not(:disabled) { border-color: var(--sage); color: var(--sage); }
.modal-close:disabled { opacity: 0.35; cursor: default; }

/* Toast */
.toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(14px);
  background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: 8px; padding: 9px 20px;
  font-size: 12px; color: var(--text);
  z-index: 300; opacity: 0; transition: all 0.28s;
  pointer-events: none; white-space: nowrap;
  font-family: var(--mono); letter-spacing: 0.04em;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok { border-color: var(--sage); color: var(--sage); }
.toast.err { border-color: var(--rose); color: var(--rose); }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="brand-block">
      <div class="brand-eye">DANVELOPER · Stock Simulator</div>
      <div class="brand-title"><em>US</em> Watchlist</div>
      <div class="brand-sub">盤後掃描 · 自選股清單 · 訊號追蹤</div>
    </div>
    <div class="header-right">
      <div class="market-pill">
        <div class="market-led" id="mled"></div>
        <span id="mstatus">確認中</span>
        <span id="mtime" style="color:var(--text3)"></span>
      </div>
      <button class="scan-btn" onclick="openScan()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
        盤後掃描
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-lbl">追蹤個股</div>
      <div class="stat-val sage" id="s-total">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">今日訊號</div>
      <div class="stat-val clay" id="s-signals">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">財報警示</div>
      <div class="stat-val" id="s-earn" style="color:var(--sand)">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-lbl">上次掃描</div>
      <div class="stat-val muted" id="s-last">從未</div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-section">
    <span class="section-label">新增追蹤個股</span>
    <div class="search-row">
      <div class="search-container">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input class="search-input" id="search-in" type="text" placeholder="輸入股票代號，如 AAPL、NVDA、TSLA…"
            autocomplete="off" oninput="onInput(this.value)" onkeydown="onKey(event)">
        </div>
        <div class="suggestions" id="sugg"></div>
      </div>
      <button class="add-btn" onclick="addFromInput()">＋ 加入清單</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-row">
    <span class="filter-lbl">板塊</span>
    <button class="chip active" data-f="ALL" onclick="setFilter(this,'ALL')">全部</button>
    <button class="chip" data-f="Technology" onclick="setFilter(this,'Technology')">科技</button>
    <button class="chip" data-f="Consumer" onclick="setFilter(this,'Consumer')">消費</button>
    <button class="chip" data-f="Healthcare" onclick="setFilter(this,'Healthcare')">醫療</button>
    <button class="chip" data-f="Finance" onclick="setFilter(this,'Finance')">金融</button>
    <button class="chip" data-f="Energy" onclick="setFilter(this,'Energy')">能源</button>
    <button class="chip" data-f="Other" onclick="setFilter(this,'Other')">其他</button>
    <div class="spacer"></div>
    <span class="count-txt" id="cnt">0 檔</span>
  </div>

  <!-- List header -->
  <div class="list-header">
    <div class="lh">#</div>
    <div class="lh">代號</div>
    <div class="lh">名稱 / 板塊</div>
    <div class="lh r">股價</div>

// Combo definitions for US market (adapted from TW system)
const COMBOS = {

      {l:`建議進場 $${s.entry||'—'}`, c:''},
      {l:`目標一 $${s.t1||'—'}`, c:'pos'},

    ]
  },

    atr: 2.0,

    meta: (s) => [

    ]
  },
  C: {
    name:'爆量反轉型', cls:'combo-c', badge:'badge-c', stars:'★★★',
    atr: 1.5,
    desc: (s) => `連續<strong>3日以上</strong>收黑後今日爆量收紅，反彈幅度 <strong>${s.bounce||'3.2'}%</strong>，成交量較20日均量放大 <strong>${s.volMult||'2.1'}x</strong>。超賣反彈，短線回補動能強。`,
    meta: (s) => [
      {l:`ATR停損倍數 ×1.5`, c:''},
      {l:`前低支撐確認`, c:'pos'},
      {l:`短線 1~3日`, c:'warn'},
    ]
  },
  D: {
    name:'箱型整理突破型', cls:'combo-d', badge:'badge-d', stars:'★★★★★',
    atr: 2.0,
    desc: (s) => `近20日震幅僅 <strong>${s.range||'5.2'}%</strong>（盤整確認），今日突破箱頂 $<strong>${s.boxTop||'—'}</strong>，量能放大 <strong>${s.volMult||'1.8'}x</strong>。整理能量釋放，美股無漲跌停，型態更完整。`,
    meta: (s) => [

    meta: (s) => [
      {l:`綜合加成 +${s.aiScore||'3'}`, c:'pos'},
      {l:`優先級 +1`, c:'pos'},
    ]

};

const SCAN_STEPS = [
  { id:'vix',   txt:'確認大盤 VIX 恐慌指數狀態' },
  { id:'sp',    txt:'下載 S&P 500 趨勢（50MA 過濾）' },
  { id:'ohlcv', txt:'抓取自選股 OHLCV 資料（Yahoo Finance）' },
  { id:'tech',  txt:'計算技術指標（ATR / MA / 成交量倍數）' },
  { id:'combo', txt:'執行六組選股組合 A～F 篩選' },
  { id:'earn',  txt:'更新財報日資訊（規避警示）' },
  { id:'out',   txt:'整理輸出，更新訊號卡片' },
];

// ── State ──
let wl = JSON.parse(localStorage.getItem('dv_us_wl') || '[]');
let filter = 'ALL';
let selSug = -1;
let lastScan = localStorage.getItem('dv_us_last') || null;
let scanTimer = null;

function save() { localStorage.setItem('dv_us_wl', JSON.stringify(wl)); }

// ── Market status ──
function updateMarket() {
  const et = new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));
  const h=et.getHours(), m=et.getMinutes(), d=et.getDay();
  const wday = d>=1&&d<=5;
  const open = wday && (h>9||(h===9&&m>=30)) && h<16;
  document.getElementById('mled').className = 'market-led' + (open?' open':'');
  document.getElementById('mstatus').textContent = open ? '美股盤中' : (wday?(h<9||(h===9&&m<30)?'盤前':'盤後'):'休市');
  document.getElementById('mtime').textContent = et.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZoneName:'short'});
}

// ── Search ──
function onInput(v) {
  selSug = -1;
  const q = v.trim().toUpperCase();
  const box = document.getElementById('sugg');
  if (!q) { box.classList.remove('show'); return; }
  const hits = DB.filter(s => s.t.startsWith(q) || s.n.toUpperCase().includes(q)).slice(0,7);
  if (!hits.length) { box.classList.remove('show'); return; }
  box.innerHTML = hits.map(s =>
    `<div class="sug-item" onclick="addStock('${s.t}','${s.n.replace(/'/g,"\\'")}','${s.s}')">
      <span class="sug-ticker">${s.t}</span>
      <span class="sug-name">${s.n}</span>
      <span class="sug-sector">${s.s}</span>
    </div>`
  ).join('');
  box.classList.add('show');
}

function onKey(e) {
  const items = document.querySelectorAll('.sug-item');
  if (e.key==='ArrowDown') { e.preventDefault(); selSug=Math.min(selSug+1,items.length-1); hilite(items); }
  else if (e.key==='ArrowUp') { e.preventDefault(); selSug=Math.max(selSug-1,-1); hilite(items); }
  else if (e.key==='Enter') { if(selSug>=0&&items[selSug]) items[selSug].click(); else addFromInput(); }
  else if (e.key==='Escape') document.getElementById('sugg').classList.remove('show');
}
function hilite(items) { items.forEach((el,i)=>el.style.background=i===selSug?'var(--bg4)':''); }

document.addEventListener('click', e => { if (!e.target.closest('.search-container')) document.getElementById('sugg').classList.remove('show'); });

function addFromInput() {
  const v = document.getElementById('search-in').value.trim().toUpperCase();
  if (!v) return;
  const m = DB.find(s=>s.t===v);
  addStock(v, m?m.n:v, m?m.s:'Other');
}

function addStock(ticker, name, sector) {
  if (wl.find(s=>s.ticker===ticker)) { toast(`${ticker} 已在清單中`,'err'); clearInput(); return; }
  wl.push({ ticker, name, sector, price:null, chgPct:null, signals:[], earningsDate:null, addedAt:Date.now() });
  save(); render(); updateStats();
  clearInput();
  toast(`已加入 ${ticker}`,'ok');
}

function removeStock(t) {
  wl = wl.filter(s=>s.ticker!==t); save(); render(); updateStats(); toast(`已移除 ${t}`);
}
function clearInput() { document.getElementById('search-in').value=''; document.getElementById('sugg').classList.remove('show'); }

// ── Filter ──
function setFilter(el, f) {
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active'); filter = f; render();
}

// ── Render ──
function render() {
  const list = filter==='ALL' ? wl : wl.filter(s=>s.sector===filter);
  document.getElementById('cnt').textContent = `${list.length} 檔`;
  const el = document.getElementById('stock-list');
  if (!list.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-glyph">∅</div>
      <div class="empty-title">${filter==='ALL'?'清單是空的':'此板塊暫無個股'}</div>
      <div class="empty-desc">在上方輸入美股代號開始建立你的追蹤清單</div>
    </div>`;
    return;
  }

  el.innerHTML = list.map((s,i) => {
    const priceStr = s.price!=null ? `$${s.price.toFixed(2)}` : '—';
    const chgCls = s.chgPct>0?'pos':s.chgPct<0?'neg':'neu';
    const chgStr = s.chgPct!=null ? `${s.chgPct>=0?'+':''}${s.chgPct.toFixed(2)}%` : '—';
    const dotColor = SECTOR_COLORS[s.sector]||'#6b6258';

    // Signal cards
    let signalHtml = '';
    if (s.signals && s.signals.length) {
      signalHtml = s.signals.map(sig => {
        const c = COMBOS[sig.id];
        if (!c) return '';
        const meta = c.meta ? c.meta(sig.data||{}) : [];
        return `<div class="signal-card ${c.cls}">
          <div class="signal-top">
            <span class="signal-badge ${c.badge}">${sig.id}</span>
            <span class="signal-name">${c.name}</span>
            ${c.stars ? `<span class="signal-stars">${c.stars}</span>` : ''}
          </div>
          <div class="signal-desc">${c.desc(sig.data||{})}</div>
          ${meta.length ? `<div class="signal-meta">${meta.map(m=>`<span class="meta-chip ${m.c}">${m.l}</span>`).join('')}</div>` : ''}
        </div>`;
      }).join('');
    } else {
      signalHtml = `<div class="no-signal">尚無訊號，等待下次掃描…</div>`;
    }

    // Earnings
    let earnHtml = '<span class="earn-date safe">—</span>';
    if (s.earningsDate) {
      const days = Math.ceil((new Date(s.earningsDate)-new Date())/86400000);
      const cls = days<=5?'warn':'safe';
      earnHtml = `<div class="earn-date ${cls}">${s.earningsDate}</div>
        <div class="earn-days ${cls}">${days<=5?`⚠ ${days}日後`:`${days}日後`}</div>`;
    }

    return `<div class="stock-row">
      <div class="row-num">${i+1}</div>
      <div class="row-ticker-wrap">
        <div class="sector-dot" style="background:${dotColor}"></div>
        <span class="row-ticker">${s.ticker}</span>
      </div>
      <div class="row-name-cell">
        <div class="row-name">${s.name}</div>
        <div class="row-sector-tag">${s.sector.toUpperCase()}</div>
      </div>
      <div class="row-price">${priceStr}</div>
      <div class="row-chg ${chgCls}">${chgStr}</div>
      <div class="signal-area">${signalHtml}</div>
      <div class="earnings-cell">${earnHtml}</div>
      <button class="del-btn" onclick="removeStock('${s.ticker}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>`;
  }).join('');
}

// ── Stats ──
function updateStats() {
  document.getElementById('s-total').textContent = wl.length;
  const hasScan = !!lastScan;
  document.getElementById('s-signals').textContent = hasScan ? wl.filter(s=>s.signals&&s.signals.length).length : '—';
  document.getElementById('s-earn').textContent = hasScan ? wl.filter(s=>s.earningsDate&&Math.ceil((new Date(s.earningsDate)-new Date())/86400000)<=5).length : '—';
  if (lastScan) {
    const d = new Date(parseInt(lastScan));
    document.getElementById('s-last').textContent =
      d.toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'}) + ' ' +
      d.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  }
}

// ── Scan ──
function openScan() {
  const ov = document.getElementById('overlay');
  const closeBtn = document.getElementById('close-btn');
  document.getElementById('pbar').style.width = '0%';
  document.getElementById('scan-note').textContent = '';
  closeBtn.disabled = true; closeBtn.textContent = '掃描中，請稍候…';

  document.getElementById('steps').innerHTML = SCAN_STEPS.map(st =>
    `<div class="step-item" id="st-${st.id}">
      <div class="step-icon wait" id="ic-${st.id}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/></svg>
      </div>
      <span class="step-txt wait" id="tx-${st.id}">${st.txt}</span>
    </div>`
  ).join('');

  ov.classList.add('show');
  runStep(0, 0);
}

function runStep(i, done) {
  if (i >= SCAN_STEPS.length) { finishScan(); return; }
  const s = SCAN_STEPS[i];
  setIcon(s.id,'run'); setTxtCls(s.id,'run');
  const delays = [500,600,900,1000,1300,600,500];
  scanTimer = setTimeout(() => {
    setIcon(s.id,'done'); setTxtCls(s.id,'done');
    done++;
    document.getElementById('pbar').style.width = `${Math.round(done/SCAN_STEPS.length*100)}%`;
    runStep(i+1, done);
  }, delays[i]||700);
}

function setIcon(id, state) {
  const el = document.getElementById(`ic-${id}`);
  el.className = `step-icon ${state}`;
  if (state==='run') el.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 3a9 9 0 1 0 9 9"/></svg>`;
  else if (state==='done') el.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  else el.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/></svg>`;
}
function setTxtCls(id, state) { document.getElementById(`tx-${id}`).className = `step-txt ${state}`; }

function finishScan() {
  const MOCK_COMBOS = ['A','B','C','D','E','F'];
  const MOCK_DATA = {
    A: {volMult:'1.6', entry:'—', t1:'—', t2:'—'},
    B: {news:'+1', analyst:'+2', fundamental:'+1', aiScore:'4', aiNote:'近期法人大幅上修目標價，機構持股比例本季增加。'},
    C: {bounce:'3.8', volMult:'2.3'},
    D: {range:'4.7', boxTop:'—', volMult:'2.1', entry:'—'},
    E: {gain5:'13.2'},
    F: {volMult:'3.1'},
    AI: {news:'+1', analyst:'+2', fundamental:'+1', aiScore:'4', aiNote:'分析師共識Buy評級，目標價高於現價18%。'}
  };

  wl.forEach(s => {
    const roll = Math.random();
    const picked = [];
    if (roll > 0.65) {
      const main = MOCK_COMBOS[Math.floor(Math.random()*MOCK_COMBOS.length)];
      picked.push({id: main, data: MOCK_DATA[main]||{}});
      if (roll > 0.82) picked.push({id:'AI', data: MOCK_DATA.AI});
    }
    s.signals = picked;
    s.price = parseFloat((Math.random()*500+20).toFixed(2));
    s.chgPct = parseFloat((Math.random()*12-6).toFixed(2));
    s.earningsDate = Math.random()>0.55 ? randDate() : null;
  });

  lastScan = Date.now().toString();
  localStorage.setItem('dv_us_last', lastScan);
  save(); render(); updateStats();

  const sigCnt = wl.filter(s=>s.signals&&s.signals.length).length;
  document.getElementById('scan-note').innerHTML =
    `✓ 掃描完成 — <span style="color:var(--sage)">${sigCnt} 檔</span>出現組合訊號`;
  const closeBtn = document.getElementById('close-btn');
  closeBtn.disabled = false; closeBtn.textContent = '關閉';
}

function closeScan() {
  document.getElementById('overlay').classList.remove('show');
  if (scanTimer) clearTimeout(scanTimer);
}

function randDate() {
  const d = new Date(); d.setDate(d.getDate()+Math.floor(Math.random()*45));
  return d.toISOString().split('T')[0];
}

// ── Toast ──
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(()=>t.classList.remove('show'), 2400);
}

// ── Init ──
